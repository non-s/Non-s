<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Pagina nao encontrada - non-s</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050807;
      --panel: #0d1117;
      --text: #d1fae5;
      --muted: #94a3b8;
      --accent: #00ff41;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: "Fira Code", ui-monospace, SFMono-Regular, Consolas, monospace;
    }
    main {
      width: min(100%, 580px);
      border: 1px solid rgba(0, 255, 65, 0.32);
      border-radius: 8px;
      background: var(--panel);
      padding: 32px;
    }
    p { color: var(--muted); line-height: 1.6; }
    .code { color: var(--accent); font-weight: 700; }
    h1 { margin: 10px 0 12px; font-size: clamp(2rem, 6vw, 3rem); }
    a {
      display: inline-flex;
      margin-top: 16px;
      color: #020617;
      background: var(--accent);
      border-radius: 6px;
      padding: 12px 16px;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <div class="code">$ status --code 404</div>
    <h1>Pagina nao encontrada</h1>
    <p>Esse caminho nao existe mais ou foi digitado errado. Volte ao hub para seguir navegando pelos projetos.</p>
    <a href="/Non-s/">Voltar ao hub</a>
  </main>
</body>
</html>
